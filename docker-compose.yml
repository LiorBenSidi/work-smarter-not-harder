# Work Smarter, Not Harder — 3 containers. ONLY `web` is exposed (host 8000 -> container 5000;
# never publish 5000 — macOS AirPlay grabs it). `ai` + `db` are internal-only.
# Run:  cp .env.example .env  &&  docker compose up --build   ->  http://localhost:8000/health
services:
  web:
    build: ./web
    ports:
      - "8000:5000"                 # the ONLY published port
    environment:
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      MONGO_URI: ${MONGO_URI:-mongodb://db:27017/worksmarter}   # override with creds when DB auth is on
      AI_URL: http://ai:5000
      FLASK_DEBUG: ${FLASK_DEBUG:-0}
      TESTING: ${TESTING:-0}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-0}   # set to 1 in production (HTTPS)
      ENABLE_LOGGING: ${ENABLE_LOGGING:-1}                 # 0 -> suppress logging (Lab-9.1 cost toggle)
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE: ${LOG_FILE:-/app/logs/web.log}             # RotatingFileHandler target (persisted below)
      # --- Auth modes (email delivery + 2FA login + signup verify). Passed through from .env so teammates
      # flip any mode in .env ALONE (no compose edit). THE mock/live switch is SMTP_HOST: unset -> mock
      # (codes logged / shown on screen); set SMTP_* + MAIL_FROM -> :8000 sends REAL email. Defaults here
      # mirror web/config.py, so `docker compose up` with no .env keys behaves exactly like the app default.
      SMTP_HOST: ${SMTP_HOST:-}                            # blank -> mock (log backend); set -> live email
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-1}
      MAIL_FROM: "${MAIL_FROM:-Work Smarter, Not Harder <no-reply@worksmarter.local>}"
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8000} # public origin baked into reset links in emails
      RESET_TOKEN_MAX_AGE: ${RESET_TOKEN_MAX_AGE:-1800}    # password-reset link lifetime (seconds; default 30 min)
      OTP_ENABLED: ${OTP_ENABLED:-1}                       # 0 -> one-step login (no 2FA code)
      OTP_TTL_SECONDS: ${OTP_TTL_SECONDS:-600}
      OTP_MAX_ATTEMPTS: ${OTP_MAX_ATTEMPTS:-5}
      REGISTER_VERIFY_EMAIL: ${REGISTER_VERIFY_EMAIL:-1}   # 0 -> create the account without verifying the email
      AUTH_DEBUG_EMAIL: ${AUTH_DEBUG_EMAIL:-}              # 1 -> debug panel's Live/Mock switch can pull codes on-screen (dev)
      REMEMBER_COOKIE_MAX_AGE: ${REMEMBER_COOKIE_MAX_AGE:-2592000}
    volumes:
      - web-logs:/app/logs                                 # keep the rotating log for inspection / ELK
      - media-data:/app/media                              # Forum/DM attachment bytes (only web mounts it)
    restart: unless-stopped           # self-heal: the only user-facing service must come back on a crash
    depends_on:
      ai: { condition: service_started }   # AI is non-critical: web boots and degrades per-request if it's down
      db: { condition: service_healthy }   # DB is core; wait for it (it self-heals via its own restart policy)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health', timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s              # don't count probe failures while the worker is still booting

  ai:                               # internal only — no host port (OWNER: Shiri)
    build: ./ai
    restart: unless-stopped         # self-heal so a one-off crash doesn't strand web (which calls it)
    environment:                    # job-queue knobs (ai/jobqueue.py) — defaults suit a dev laptop
      AI_QUEUE_WORKERS: ${AI_QUEUE_WORKERS:-4}       # process-pool size = parallel scorers
      AI_QUEUE_MAX_PENDING: ${AI_QUEUE_MAX_PENDING:-64}  # backlog cap -> 503 past it, never an OOM
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health', timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  db:                               # MongoDB — internal only. Indexes / validators / seeding live in
    image: mongo:7                  # web/services/db.py + db/seed.py (see db/README.md).
    restart: unless-stopped         # recover from a crash on its own (the data lives in the volume)
    environment:                    # auth is env-gated: BOTH blank -> no auth (local dev); set both ->
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-}     # mongo creates a root user and requires auth
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-} # (then point MONGO_URI at the creds — see .env.example)
    expose:
      - "27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s              # mongo's first-run init on a cold volume can exceed a few probes

volumes:
  mongo-data:
  web-logs:
  media-data:
