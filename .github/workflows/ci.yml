name: CI

# Automated checks that gate every PR before human review (course: Unit/Integration/System/Stress/Security + CI/CD).
# Make this a REQUIRED status check in main's branch protection so a PR can't be merged until it's green.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:        # manual trigger for the on-demand stress job (locust needs a live stack)

jobs:
  checks:
    name: checks
    runs-on: ubuntu-latest
    services:
      mongo:                              # real MongoDB so the data-layer integration tests RUN in CI (not skip)
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling + project deps (if present)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt   # pinned ruff/bandit/pytest — identical versions to the local hooks
          # install project requirements as they appear (root + per-container). A MISSING file is skipped; a real
          # install failure now FAILS the step (no `|| true` mask) so a broken pin can't slip through to build (R2.2).
          for f in requirements.txt web/requirements.txt ai/requirements.txt; do
            if [ -f "$f" ]; then pip install -r "$f"; fi
          done

      - name: Lint (ruff)
        run: ruff check .

      - name: Security scan (bandit)
        run: bandit -r . -q -x ./tests,./.venv,./venv,./env   # exclude tests + any local venv (matches the hook). Tune with -ll if noisy.

      - name: Wait for MongoDB
        run: |
          python - <<'PY'
          import sys, time
          from pymongo import MongoClient
          from pymongo.errors import PyMongoError
          for _ in range(30):
              try:
                  MongoClient("mongodb://localhost:27017/", serverSelectionTimeoutMS=1000).admin.command("ping")
                  print("mongo ready"); sys.exit(0)
              except PyMongoError:
                  time.sleep(1)
          sys.exit("MongoDB did not become ready in time")
          PY

      - name: Tests (pytest) — Unit/Integration/System/Security under tests/ (+ real-Mongo IT)
        env:
          TEST_MONGO_URI: mongodb://localhost:27017/worksmarter_test   # makes test_db_mongo.py RUN, not skip
        run: python -m pytest tests/ -q   # must pass; a suite that collects 0 tests now FAILS (no false-green)

  # ---------------------------------------------------------------------------
  # Cross-container gate (OWNER: Elad). `checks` runs the suite IN-PROCESS with injected fakes; this
  # job boots the REAL 3-container stack and runs the containerized test-runner against it, so the
  # web -> ai -> db wire path (HTTP, gunicorn, a real Mongo) is proven before anything is published.
  # It runs on PRs too: a teammate's change that breaks the stack goes red on the PR, not after merge.
  # ---------------------------------------------------------------------------
  compose-e2e:
    name: cross-container stack (test-runner)
    needs: checks                       # don't spend 3 minutes booting Docker if the fast suite is red
    if: github.event_name != 'workflow_dispatch'   # the manual run is for the stress job below
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Render a throwaway .env (compose requires SECRET_KEY; never a real secret here)
        run: echo "SECRET_KEY=ci-only-not-a-real-secret-$RANDOM" > .env

      - name: Boot the stack and run the test-runner against it
        # --exit-code-from tests: the job's result IS the runner's exit code (it also implies
        # --abort-on-container-exit, so web/ai/db are torn down as soon as the suite finishes).
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml up --build --exit-code-from tests

      - name: Dump container logs on failure (so a red run is debuggable without a local repro)
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml logs --no-color --tail 200

      - name: Tear down (volumes too — the throwaway DB must not leak into a rerun)
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml down -v --remove-orphans

  # ---------------------------------------------------------------------------
  # Browser E2E (interaction) gate. `compose-e2e` proves the HTTP wire path; THIS job drives the real UI in
  # a headless Chrome (dependency-free — Node's built-in WebSocket over CDP, Chrome ships on the runner) at
  # BOTH desktop and mobile viewports, so a clicked-through regression (e.g. the forum "can't open a post
  # after voting" wedge) fails the PR. Boots with OTP/verify-email OFF so the browser can complete auth
  # without a mailbox. Runs on PRs too. See tests/E2E_Tests/SCENARIOS.md for the full plan.
  # ---------------------------------------------------------------------------
  e2e-browser:
    name: e2e (browser · desktop + mobile)
    needs: checks
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"            # global WebSocket + fetch (the harness uses no npm packages)

      - name: Locate Chrome (pre-installed on ubuntu runners)
        run: google-chrome --version || google-chrome-stable --version || chromium-browser --version

      - name: Render an E2E .env (OTP + verify-email OFF so the browser can finish auth without a mailbox)
        run: |
          {
            echo "SECRET_KEY=ci-only-not-a-real-secret-$RANDOM"
            echo "REGISTER_VERIFY_EMAIL=0"
            echo "OTP_ENABLED=0"
            echo "SMTP_HOST="
            echo "SESSION_COOKIE_SECURE=0"
          } > .env

      - name: Boot the stack (detached) and wait for it to serve
        run: |
          docker compose up --build -d
          curl --fail --retry 30 --retry-delay 2 --retry-all-errors http://localhost:8000/ready

      - name: Run the browser E2E suite at desktop AND mobile
        env:
          E2E_BASE_URL: http://localhost:8000
        run: node tests/E2E_Tests/run.mjs both

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs --no-color --tail 200

      - name: Tear down (volumes too)
        if: always()
        run: docker compose down -v --remove-orphans

  # ---------------------------------------------------------------------------
  # CD half (assignment R3–R10). These jobs run ONLY on push to main — a PR
  # stops after `checks` above (R1.3), because both are gated on the push event.
  # ---------------------------------------------------------------------------

  build:
    name: build & push image (GHCR)
    # R2.2: a failed test build never proceeds to build/push/deploy — and neither does a stack whose
    # cross-container path is broken (compose-e2e), which unit tests with injected fakes cannot catch.
    needs: [checks, compose-e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'   # R1.3: a PR never reaches here
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write                   # lets the built-in GITHUB_TOKEN push to THIS repo's GHCR (R4.2)
    steps:
      - uses: actions/checkout@v4

      - name: Compute image vars
        id: vars
        run: |
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"   # GHCR requires a lowercase owner
          echo "sha=${GITHUB_SHA::7}"               >> "$GITHUB_OUTPUT"   # short, immutable per-commit tag (R3.2)

      - name: Log in to GHCR
        # the workflow's built-in GITHUB_TOKEN — no PAT, no registry signup (R4.2, Noam Q4).
        # --password-stdin keeps the token out of the process list and the logs.
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build & push web image
        env:
          IMG: ghcr.io/${{ steps.vars.outputs.owner }}/work-smarter-web
          DOCKER_BUILDKIT: "1"
        run: |
          docker pull "$IMG:latest" || true    # prime the layer cache from the previous build (first run misses)
          docker build --cache-from "$IMG:latest" --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t "$IMG:latest" -t "$IMG:${{ steps.vars.outputs.sha }}" ./web   # R3.1/R3.3: from ./web/Dockerfile, repo only
          # R4.3: push BOTH tags (the stable :latest carrying inline-cache metadata + the immutable :sha).
          # Retry each: GHCR intermittently returns a transient "unknown blob" mid-upload (a registry flake,
          # not a build error) — a retry clears it so a hiccup can't fail the whole deploy and leave the site
          # on the old image. Up to 4 attempts, 10s apart.
          for tag in latest "${{ steps.vars.outputs.sha }}"; do
            n=0; until docker push "$IMG:$tag"; do n=$((n+1)); [ "$n" -ge 4 ] && exit 1; echo "push $IMG:$tag failed (attempt $n) — retrying in 10s"; sleep 10; done
          done

      - name: Build & push ai image
        env:
          IMG: ghcr.io/${{ steps.vars.outputs.owner }}/work-smarter-ai
          DOCKER_BUILDKIT: "1"
        run: |
          docker pull "$IMG:latest" || true
          docker build --cache-from "$IMG:latest" --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t "$IMG:latest" -t "$IMG:${{ steps.vars.outputs.sha }}" ./ai
          for tag in latest "${{ steps.vars.outputs.sha }}"; do   # same transient-flake retry as the web push
            n=0; until docker push "$IMG:$tag"; do n=$((n+1)); [ "$n" -ge 4 ] && exit 1; echo "push $IMG:$tag failed (attempt $n) — retrying in 10s"; sleep 10; done
          done

  deploy:
    name: deploy to Azure VM
    needs: build
    # Deploy runs only when BOTH hold: SSH_HOST is set (the VM FQDN — stays configured permanently) AND the
    # DEPLOY_ENABLED switch == 'true'. Flip modes with ONE command, without ever touching SSH_HOST:
    #   dev  / off:  gh variable set DEPLOY_ENABLED --body false
    #   live / on :  gh variable set DEPLOY_ENABLED --body true
    # An unset (or anything-but-'true') DEPLOY_ENABLED counts as OFF, so main stays green by default.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.SSH_HOST != '' && vars.DEPLOY_ENABLED == 'true'
    concurrency:
      group: azure-deploy-${{ github.ref }}
      cancel-in-progress: false     # never interrupt an in-flight deploy — queue the next push instead of racing the VM
    runs-on: ubuntu-latest
    env:
      # The VM login user. The instructor's Azure VMs use `azureuser` (it replaced the old `deploy` name);
      # overridable via a repo variable if a future VM differs — same pattern as SSH_HOST / SITE_ADDRESS.
      DEPLOY_USER: ${{ vars.SSH_USER || 'azureuser' }}
    steps:
      - uses: actions/checkout@v4

      - name: Load the deploy SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}   # a DEDICATED deploy key, not a personal key (§10)
        run: |
          : "${SSH_PRIVATE_KEY:?SSH_PRIVATE_KEY secret is not set}"   # fail with a clear message here, not a cryptic ssh error later
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key   # secret -> file; GitHub masks it in logs (R6.2)
          chmod 600 ~/.ssh/deploy_key

      - name: Render the prod .env (from GitHub secrets/vars — never committed, R6.1)
        env:
          APP_SECRET_KEY: ${{ secrets.APP_SECRET_KEY }}   # Flask SECRET_KEY, injected at runtime
          # Public address for the cert + links: your own domain if set (e.g. app.worksmarternotharder.dev),
          # else the Azure FQDN. SSH still targets SSH_HOST — the ssh host and the public URL can differ.
          SITE_ADDRESS: ${{ vars.SITE_ADDRESS || vars.SSH_HOST }}
          OWNER: ${{ github.repository_owner }}
          SMTP_USER: ${{ secrets.SMTP_USER }}   # Brevo relay login — enables real inbox delivery for OTP/reset
          SMTP_PASS: ${{ secrets.SMTP_PASS }}   # Brevo SMTP key (secret)
        run: |
          : "${APP_SECRET_KEY:?APP_SECRET_KEY secret is not set}"   # fail HERE with a clear message, not later at container boot
          {
            echo "SECRET_KEY=${APP_SECRET_KEY}"
            echo "SITE_ADDRESS=${SITE_ADDRESS}"                    # Caddy issues the Let's Encrypt cert for this FQDN (R10)
            echo "IMAGE_OWNER=$(echo "$OWNER" | tr 'A-Z' 'a-z')"  # which GHCR namespace the VM pulls from
            echo "IMAGE_TAG=${GITHUB_SHA::7}"                       # deploy the EXACT commit CI built (not a moving :latest) — reproducible + rollback-ready
          } > prod.env
          # Real email is self-gating: wire Brevo ONLY when the SMTP secret is present; otherwise the app safely
          # uses the log backend (OTP written to the log) and login still works — mirrors the deploy job's own dormancy.
          if [ -n "$SMTP_PASS" ]; then
            {
              echo "SMTP_HOST=smtp-relay.brevo.com"
              echo "SMTP_PORT=587"
              echo "SMTP_USER=${SMTP_USER}"
              echo "SMTP_PASS=${SMTP_PASS}"
              echo "MAIL_FROM=Work Smarter <no-reply@worksmarternotharder.dev>"
            } >> prod.env
          fi

      - name: Ship compose + Caddyfile + env to the VM
        env:
          HOST: ${{ vars.SSH_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new "$DEPLOY_USER@$HOST" "mkdir -p ~/app"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            docker-compose.prod.yml Caddyfile prod.env "$DEPLOY_USER@$HOST:~/app/"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new "$DEPLOY_USER@$HOST" "mv ~/app/prod.env ~/app/.env"

      - name: Deploy — the VM PULLS from GHCR and runs; record the previous SHA for rollback (R5.2)
        id: deploy
        env:
          HOST: ${{ vars.SSH_HOST }}
        run: |
          # the last-good SHA (empty on the first deploy) — the rollback target if the health check fails
          PREV=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new "$DEPLOY_USER@$HOST" "cat ~/app/.last_good_sha 2>/dev/null || true" || true)
          echo "prev=$PREV" >> "$GITHUB_OUTPUT"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new "$DEPLOY_USER@$HOST" \
            "cd ~/app && docker compose -f docker-compose.prod.yml pull && \
             docker compose -f docker-compose.prod.yml up -d --remove-orphans && \
             { docker compose -f docker-compose.prod.yml exec -T caddy caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile || docker compose -f docker-compose.prod.yml restart caddy ; }"
          # 'up -d' recreates only services whose compose definition changed, so a bind-mounted Caddyfile edit
          # (e.g. new security headers) never restarts Caddy on its own -> reload it explicitly (restart = fallback).
          # idempotent (R5.3); restart policy => reboot-safe (R5.4)

      - name: Health check against the public HTTPS address (R7 — readiness, the real VM + a live DB ping)
        env:
          SITE: ${{ vars.SITE_ADDRESS || vars.SSH_HOST }}   # the branded domain if set, else the Azure FQDN
        # /ready pings Mongo, so a pass proves the WHOLE stack serves (not just that web answers). --fail => non-zero on
        # any 4xx/5xx; --retry-all-errors also retries the TLS handshake during the first cold-boot cert issuance. 15x5s.
        run: curl --fail --retry 15 --retry-delay 5 --retry-all-errors "https://$SITE/ready"

      - name: Record this SHA as the last-good deploy
        if: success()
        env:
          HOST: ${{ vars.SSH_HOST }}
        run: ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new "$DEPLOY_USER@$HOST" "printf '%s' '${GITHUB_SHA::7}' > ~/app/.last_good_sha"

      - name: Roll back to the previous SHA on an unhealthy deploy (R8.2)
        if: failure() && steps.deploy.outputs.prev != ''
        env:
          HOST: ${{ vars.SSH_HOST }}
          PREV: ${{ steps.deploy.outputs.prev }}
        run: |
          echo "::warning::health check failed — rolling the VM back to ${PREV}"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new "$DEPLOY_USER@$HOST" \
            "cd ~/app && sed -i 's/^IMAGE_TAG=.*/IMAGE_TAG=${PREV}/' .env && \
             docker compose -f docker-compose.prod.yml pull && \
             docker compose -f docker-compose.prod.yml up -d --remove-orphans"
          # the run still ends RED (the health step already failed — R8.1 intact); rollback only restores the last-good image

  # ---------------------------------------------------------------------------
  # Stress tests (locust) — ON DEMAND only (OWNER: Elad). They need a running stack and minutes of
  # runtime, so they are NOT a merge gate: `Actions -> CI -> Run workflow`. Also the harness used for
  # the before/after scaling numbers (`--scale ai=N`, gunicorn workers).
  # ---------------------------------------------------------------------------
  stress:
    name: stress (locust, on demand)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install the stress tooling
        run: pip install locust==2.32.4 requests==2.32.3 pytest==8.4.2

      - name: Render a throwaway .env
        run: echo "SECRET_KEY=ci-only-not-a-real-secret-$RANDOM" > .env

      - name: Boot the stack (detached) and wait for it to serve
        run: |
          docker compose up --build -d
          curl --fail --retry 30 --retry-delay 2 --retry-all-errors http://localhost:8000/ready

      - name: Concurrency burst (pytest) — 5xx = fail, 429 = the rate-limit defending
        env:
          E2E_BASE_URL: http://localhost:8000
        run: python -m pytest tests/Stress_Tests -q

      - name: Ramped load (locust, headless) — 50 users, 1 minute
        # --exit-code-on-error 1: any request the scenario marks as a failure (a 5xx, a dropped
        # connection) fails the job. A 429 is scored as a success — see the locustfile's rationale.
        run: |
          locust -f tests/Stress_Tests/locustfile.py --headless \
            -u 50 -r 10 -t 1m --host http://localhost:8000 \
            --exit-code-on-error 1 --csv stress-report

      - name: Upload the locust report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: locust-report
          path: stress-report*.csv
          if-no-files-found: ignore

      - name: Tear down
        if: always()
        run: docker compose down -v --remove-orphans
