name: CI

# Automated checks that gate every PR before human review (course: Unit/Integration/System/Stress/Security + CI/CD).
# Make this a REQUIRED status check in main's branch protection so a PR can't be merged until it's green.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  checks:
    name: checks
    runs-on: ubuntu-latest
    services:
      mongo:                              # real MongoDB so the data-layer integration tests RUN in CI (not skip)
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling + project deps (if present)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt   # pinned ruff/bandit/pytest — identical versions to the local hooks
          # install project requirements as they appear (root + per-container). A MISSING file is skipped; a real
          # install failure now FAILS the step (no `|| true` mask) so a broken pin can't slip through to build (R2.2).
          for f in requirements.txt web/requirements.txt ai/requirements.txt; do
            if [ -f "$f" ]; then pip install -r "$f"; fi
          done

      - name: Lint (ruff)
        run: ruff check .

      - name: Security scan (bandit)
        run: bandit -r . -q -x ./tests,./.venv,./venv,./env   # exclude tests + any local venv (matches the hook). Tune with -ll if noisy.

      - name: Wait for MongoDB
        run: |
          python - <<'PY'
          import sys, time
          from pymongo import MongoClient
          from pymongo.errors import PyMongoError
          for _ in range(30):
              try:
                  MongoClient("mongodb://localhost:27017/", serverSelectionTimeoutMS=1000).admin.command("ping")
                  print("mongo ready"); sys.exit(0)
              except PyMongoError:
                  time.sleep(1)
          sys.exit("MongoDB did not become ready in time")
          PY

      - name: Tests (pytest) — Unit/Integration/System/Security under tests/ (+ real-Mongo IT)
        env:
          TEST_MONGO_URI: mongodb://localhost:27017/worksmarter_test   # makes test_db_mongo.py RUN, not skip
        run: python -m pytest tests/ -q   # must pass; a suite that collects 0 tests now FAILS (no false-green)

  # ---------------------------------------------------------------------------
  # CD half (assignment R3–R10). These jobs run ONLY on push to main — a PR
  # stops after `checks` above (R1.3), because both are gated on the push event.
  # ---------------------------------------------------------------------------

  build:
    name: build & push image (GHCR)
    needs: checks                       # R2.2: a failed test build never proceeds to build/push/deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'   # R1.3: a PR never reaches here
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write                   # lets the built-in GITHUB_TOKEN push to THIS repo's GHCR (R4.2)
    steps:
      - uses: actions/checkout@v4

      - name: Compute image vars
        id: vars
        run: |
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"   # GHCR requires a lowercase owner
          echo "sha=${GITHUB_SHA::7}"               >> "$GITHUB_OUTPUT"   # short, immutable per-commit tag (R3.2)

      - name: Log in to GHCR
        # the workflow's built-in GITHUB_TOKEN — no PAT, no registry signup (R4.2, Noam Q4).
        # --password-stdin keeps the token out of the process list and the logs.
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build & push web image
        env:
          IMG: ghcr.io/${{ steps.vars.outputs.owner }}/work-smarter-web
        run: |
          docker build -t "$IMG:latest" -t "$IMG:${{ steps.vars.outputs.sha }}" ./web   # R3.1/R3.3: from ./web/Dockerfile, repo only
          docker push "$IMG:latest"                                                       # R4.3: push BOTH tags...
          docker push "$IMG:${{ steps.vars.outputs.sha }}"                                # ...the stable one and the immutable one

      - name: Build & push ai image
        env:
          IMG: ghcr.io/${{ steps.vars.outputs.owner }}/work-smarter-ai
        run: |
          docker build -t "$IMG:latest" -t "$IMG:${{ steps.vars.outputs.sha }}" ./ai
          docker push "$IMG:latest"
          docker push "$IMG:${{ steps.vars.outputs.sha }}"

  deploy:
    name: deploy to Azure VM
    needs: build
    # Same push gate PLUS a live-VM gate: until SSH_HOST is set this job is SKIPPED (main stays green), then it
    # activates automatically the moment the VM variable + secrets exist — no code change needed to go live.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.SSH_HOST != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load the deploy SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}   # a DEDICATED deploy key, not a personal key (§10)
        run: |
          : "${SSH_PRIVATE_KEY:?SSH_PRIVATE_KEY secret is not set}"   # fail with a clear message here, not a cryptic ssh error later
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key   # secret -> file; GitHub masks it in logs (R6.2)
          chmod 600 ~/.ssh/deploy_key

      - name: Render the prod .env (from GitHub secrets/vars — never committed, R6.1)
        env:
          APP_SECRET_KEY: ${{ secrets.APP_SECRET_KEY }}   # Flask SECRET_KEY, injected at runtime
          SITE_ADDRESS: ${{ vars.SSH_HOST }}
          OWNER: ${{ github.repository_owner }}
          SMTP_USER: ${{ secrets.SMTP_USER }}   # Brevo relay login — enables real inbox delivery for OTP/reset
          SMTP_PASS: ${{ secrets.SMTP_PASS }}   # Brevo SMTP key (secret)
        run: |
          : "${APP_SECRET_KEY:?APP_SECRET_KEY secret is not set}"   # fail HERE with a clear message, not later at container boot
          {
            echo "SECRET_KEY=${APP_SECRET_KEY}"
            echo "SITE_ADDRESS=${SITE_ADDRESS}"                    # Caddy issues the Let's Encrypt cert for this FQDN (R10)
            echo "IMAGE_OWNER=$(echo "$OWNER" | tr 'A-Z' 'a-z')"  # which GHCR namespace the VM pulls from
            echo "IMAGE_TAG=${GITHUB_SHA::7}"                       # deploy the EXACT commit CI built (not a moving :latest) — reproducible + rollback-ready
          } > prod.env
          # Real email is self-gating: wire Brevo ONLY when the SMTP secret is present; otherwise the app safely
          # uses the log backend (OTP written to the log) and login still works — mirrors the deploy job's own dormancy.
          if [ -n "$SMTP_PASS" ]; then
            {
              echo "SMTP_HOST=smtp-relay.brevo.com"
              echo "SMTP_PORT=587"
              echo "SMTP_USER=${SMTP_USER}"
              echo "SMTP_PASS=${SMTP_PASS}"
              echo "MAIL_FROM=Work Smarter <no-reply@worksmarternotharder.dev>"
            } >> prod.env
          fi

      - name: Ship compose + Caddyfile + env to the VM
        env:
          HOST: ${{ vars.SSH_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new "deploy@$HOST" "mkdir -p ~/app"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            docker-compose.prod.yml Caddyfile prod.env "deploy@$HOST:~/app/"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new "deploy@$HOST" "mv ~/app/prod.env ~/app/.env"

      - name: Deploy — the VM PULLS from GHCR and runs (R5.2; it never builds locally)
        env:
          HOST: ${{ vars.SSH_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new "deploy@$HOST" \
            "cd ~/app && docker compose -f docker-compose.prod.yml pull && \
             docker compose -f docker-compose.prod.yml up -d --remove-orphans"   # idempotent (R5.3); restart policy => reboot-safe (R5.4)

      - name: Health check against the HTTPS FQDN (R7 — the real VM, not the runner)
        env:
          HOST: ${{ vars.SSH_HOST }}
        # --fail => non-zero on any 4xx/5xx. --retry-all-errors ALSO retries a TLS-handshake failure while Caddy is
        # still issuing the first Let's Encrypt cert on a cold boot (plain --retry-connrefused would not). 15x5s window.
        run: curl --fail --retry 15 --retry-delay 5 --retry-all-errors "https://$HOST/health"

  # Stress tests (locust) run on demand, not as a merge gate — they need a running stack.
  # Add a separate job (or a manual `workflow_dispatch`) once the app is up, per the course's stress-testing lab.
