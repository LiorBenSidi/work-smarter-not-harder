<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Work Smarter, Not Harder</title>
  <style>
    /* "Work Smarter" — a training-readiness coach. Visual identity: a performance lab. Teal signal +
       a coral brand mark (not the generic dashboard blue); data set in monospace; the readiness verdict
       is the signature element — a live-signal dot + a recovery track, color-coded green/amber/red. */
    :root { color-scheme: light dark;
      --font-sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
      /* dark (default) — the lab at night */
      --bg:#080d1a; --card:#111a30; --ink:#eaf0ff; --muted:#8b98ba; --accent:#2dd4bf;
      --ok:#34d399; --warn:#fbbf24; --err:#fb7185; --line:#212c49; --field:#0c1426; --on-accent:#04201d;
      --brand:#fb7185; --ready:#34d399; --moderate:#fbbf24; --rest:#fb7185;
      --shadow:0 18px 40px -26px rgba(0,0,0,.85); --glow:rgba(45,212,191,.12); }
    @media (prefers-color-scheme: light) {
      :root {
        --bg:#f3f6fc; --card:#ffffff; --ink:#101831; --muted:#5a657f; --accent:#0d9488;
        --ok:#059669; --warn:#b45309; --err:#dc2626; --line:#dde4f2; --field:#eef2fb; --on-accent:#ffffff;
        --brand:#e11d6b; --ready:#059669; --moderate:#b45309; --rest:#dc2626;
        --shadow:0 18px 40px -28px rgba(20,40,80,.22); --glow:rgba(13,148,136,.10); }
    }
    * { box-sizing: border-box; }
    body { margin:0; font-family: var(--font-sans); color: var(--ink);
      background: radial-gradient(1100px 420px at 50% -240px, var(--glow), transparent) no-repeat, var(--bg);
      background-attachment: fixed; -webkit-font-smoothing: antialiased; }
    header { padding: 16px 24px; border-bottom: 1px solid var(--line); display:flex; align-items:center; justify-content:space-between; flex-wrap: wrap; gap: 10px; }
    .brand { display:flex; align-items:baseline; gap:10px; text-decoration:none; color:inherit; }
    .brand-dot { width:11px; height:11px; border-radius:50%; background:var(--brand); align-self:center;
      box-shadow:0 0 0 4px color-mix(in srgb, var(--brand) 22%, transparent); animation: beat 2.4s ease-in-out infinite; }
    .brand-name { font-size:18px; font-weight:800; letter-spacing:.10em; }
    .brand-tag { font-family: var(--font-mono); font-size:11px; color:var(--muted); letter-spacing:.02em; }
    main { max-width: 840px; margin: 0 auto; padding: 28px 24px 48px; animation: rise .4s ease both; }
    .card { background: var(--card); border:1px solid var(--line); border-radius: 14px; padding: 22px; margin-bottom: 18px; box-shadow: var(--shadow); }
    .card h2 { margin: 0 0 16px; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .12em; font-weight:700; display:flex; align-items:center; justify-content:space-between; gap:10px; }
    label { display:block; font-size: 13px; color: var(--muted); margin: 10px 0 4px; }
    input, select, textarea { width:100%; padding: 10px 12px; background:var(--field); border:1px solid var(--line); border-radius: 9px; color: var(--ink); font-size: 14px; font-family: inherit; transition: border-color .12s, box-shadow .12s; }
    input[type=number] { font-family: var(--font-mono); }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent); outline: none; }
    button { background: var(--accent); color:var(--on-accent); border:0; border-radius: 9px; padding: 10px 16px; font-weight: 700; cursor: pointer; font-size: 14px; transition: filter .12s, transform .04s; }
    button:hover { filter: brightness(1.08); } button:active { transform: translateY(1px); }
    button.ghost { background: transparent; color: var(--accent); border:1px solid var(--line); font-weight:600; }
    button.ghost:hover { border-color: var(--accent); filter:none; }
    .row { display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .flash { font-size: 13px; margin-top: 10px; min-height: 18px; }
    .flash.error { color: var(--err); } .flash.ok { color: var(--ok); } .flash.warn { color: var(--warn); }
    .tabs { display:flex; gap: 8px; margin-bottom: 16px; }
    .tabs button { background: transparent; border:1px solid var(--line); color: var(--muted); font-weight:600; }
    .tabs button.active { background: var(--accent); color:var(--on-accent); border-color: var(--accent); }
    /* signature: the readiness verdict — a live signal + a recovery track, color-coded by state */
    .readiness { --st: var(--muted); }
    .readiness.ready { --st: var(--ready); } .readiness.moderate { --st: var(--moderate); } .readiness.rest { --st: var(--rest); }
    .verdict { display:flex; align-items:center; gap:12px; font-size:30px; font-weight:800; letter-spacing:-.02em; line-height:1.1; color: var(--st); }
    .signal { width:13px; height:13px; border-radius:50%; background: var(--st); flex:none;
      box-shadow:0 0 0 4px color-mix(in srgb, var(--st) 20%, transparent); animation: beat 2s ease-in-out infinite; }
    .track { height:6px; border-radius:999px; background: var(--field); overflow:hidden; margin:14px 0 4px; }
    .track > span { display:block; height:100%; width:0; background: var(--st); border-radius:999px; transition: width .7s cubic-bezier(.2,.7,.2,1); }
    .pill { display:inline-block; padding: 4px 11px; border-radius: 999px; font-size: 12px; font-family: var(--font-mono); background:var(--field); border:1px solid var(--line); color: var(--ink); }
    ul { margin: 10px 0 0; padding-left: 18px; } li { margin: 5px 0; }
    .muted { color: var(--muted); font-size: 13px; }
    .info { position:relative; display:inline-flex; align-items:center; justify-content:center; width:15px; height:15px; margin-left:6px; border-radius:50%; background:var(--accent); color:var(--on-accent); font-size:10px; font-weight:700; font-style:normal; cursor:help; vertical-align:middle; }
    .info .tip { position:absolute; top:150%; left:0; white-space:nowrap; background:var(--card); color:var(--ink); border:1px solid var(--line); border-radius:6px; padding:6px 9px; font-size:12px; font-weight:400; text-transform:none; letter-spacing:0; box-shadow:0 6px 18px rgba(0,0,0,.35); opacity:0; pointer-events:none; transition:opacity .12s; z-index:20; }
    .info:hover .tip, .info:focus-visible .tip, .info:focus .tip { opacity:1; }
    button:disabled { opacity:.55; cursor:not-allowed; }
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    [hidden] { display:none !important; }
    @keyframes beat { 0%,100%{ box-shadow:0 0 0 3px color-mix(in srgb, var(--st, var(--brand)) 28%, transparent); } 50%{ box-shadow:0 0 0 8px color-mix(in srgb, var(--st, var(--brand)) 4%, transparent); } }
    @keyframes rise { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:none; } }
    @media (max-width: 560px) { .row { grid-template-columns: 1fr; } main { padding: 18px 16px 40px; } }
    @media (prefers-reduced-motion: reduce) { *, ::before, ::after { animation: none !important; transition: none !important; } .track > span { width: var(--w, 100%) !important; } }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="/" aria-label="Work Smarter, Not Harder — home">
      <span class="brand-dot" aria-hidden="true"></span>
      <span class="brand-name">WORK SMARTER</span>
      <span class="brand-tag">training readiness, decided</span>
    </a>
    <div id="who" hidden><span id="who-name" class="muted"></span>
      <button id="logout-btn" class="ghost" style="margin-left:10px">Log out</button>
    </div>
  </header>

  <main>
    <!-- ===== Auth view ===== -->
    <section id="auth-view">
      <div class="card" style="max-width:420px;margin:40px auto">
        <div class="tabs">
          <button id="tab-login" class="active" onclick="showTab('login')">Log in</button>
          <button id="tab-register" onclick="showTab('register')">Register</button>
        </div>

        <form id="login-form">
          <label for="login-username">Username</label><input id="login-username" name="username" autocomplete="username" required>
          <label for="login-password">Password</label><input id="login-password" name="password" type="password" autocomplete="current-password" required>
          <div style="margin-top:14px"><button type="submit">Log in</button></div>
          <div id="login-flash" class="flash" aria-live="polite"></div>
        </form>

        <form id="register-form" hidden>
          <label for="reg-username">Username<span class="info" id="reg-username-info" tabindex="0" role="note" aria-label="Username requirements">i<span class="tip" aria-hidden="true" id="reg-username-tip"></span></span></label><input id="reg-username" name="username" autocomplete="username" required>
          <label for="reg-password">Password<span id="reg-pw-minhint"></span><span class="info" id="reg-password-info" tabindex="0" role="note" aria-label="Password requirements">i<span class="tip" aria-hidden="true" id="reg-password-tip"></span></span></label><input id="reg-password" name="password" type="password" autocomplete="new-password" required>
          <div style="margin-top:14px"><button type="submit">Create account</button></div>
          <div id="register-flash" class="flash" aria-live="polite"></div>
        </form>
      </div>
    </section>

    <!-- ===== App view ===== -->
    <section id="app-view" hidden>
      <div class="card">
        <h2>Your profile</h2>
        <form id="profile-form">
          <div class="row">
            <div><label for="age">Age</label><input id="age" name="age" type="number" min="10" max="120" required></div>
            <div><label for="gender">Gender</label>
              <select id="gender" name="gender"><option value="male">Male</option><option value="female">Female</option><option value="other">Other</option></select>
            </div>
            <div><label for="height">Height (cm)</label><input id="height" name="height" type="number" min="50" max="300" step="0.1" required></div>
            <div><label for="weight">Weight (kg)</label><input id="weight" name="weight" type="number" min="20" max="500" step="0.1" required></div>
            <div><label for="goal">Goal</label>
              <select id="goal" name="goal"><option value="lose">Lose</option><option value="maintain">Maintain</option><option value="gain">Gain</option></select>
            </div>
            <div><label for="training_frequency">Training days / week</label><input id="training_frequency" name="training_frequency" type="number" min="0" max="14" required></div>
          </div>
          <div style="margin-top:14px"><button type="submit">Save profile</button></div>
          <div id="profile-flash" class="flash" aria-live="polite"></div>
        </form>
      </div>

      <div class="card">
        <h2>Daily check-in</h2>
        <form id="checkin-form">
          <div class="row">
            <div><label for="sleep_hours">Sleep (hours)</label><input id="sleep_hours" name="sleep_hours" type="number" min="0" max="24" step="0.1" required></div>
            <div><label for="resting_hr">Resting HR (bpm)</label><input id="resting_hr" name="resting_hr" type="number" min="30" max="220" required></div>
            <div><label for="fatigue">Fatigue (1–10)</label><input id="fatigue" name="fatigue" type="number" min="1" max="10" required></div>
            <div><label for="soreness">Soreness (1–10)</label><input id="soreness" name="soreness" type="number" min="1" max="10" required></div>
            <div><label for="training_load">Training load (0–10)</label><input id="training_load" name="training_load" type="number" min="0" max="10" required></div>
          </div>
          <div style="margin-top:14px"><button type="submit">Submit check-in</button></div>
          <div id="checkin-flash" class="flash" aria-live="polite"></div>
        </form>
      </div>

      <div class="card">
        <h2>Dashboard — readiness <button id="dashboard-refresh" class="ghost" style="padding:5px 10px">Refresh</button></h2>
        <div id="dashboard"><p class="muted">Loading…</p></div>
      </div>

      <div class="card">
        <h2>History <button id="history-refresh" class="ghost" style="padding:5px 10px">Refresh</button></h2>
        <div id="history"><p class="muted">Loading…</p></div>
      </div>

      <div class="card">
        <h2>Forum <button id="forum-refresh" class="ghost" style="padding:5px 10px">Refresh</button></h2>
        <form id="forum-form" style="margin-bottom:14px">
          <input name="title" placeholder="Post title" aria-label="Post title" maxlength="140" required>
          <textarea name="body" placeholder="Share something…" aria-label="Post body" rows="2" required style="margin-top:8px;resize:vertical"></textarea>
          <label style="display:flex;align-items:center;gap:6px;margin-top:8px"><input type="checkbox" name="anonymous" style="width:auto"> Post anonymously</label>
          <div style="margin-top:8px"><button type="submit">Post</button></div>
          <div id="forum-flash" class="flash" aria-live="polite"></div>
        </form>
        <div id="forum-list"><p class="muted">Loading…</p></div>
        <div id="forum-detail" hidden></div>
      </div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);

    function getCookie(name) {
      const m = document.cookie.split("; ").find((c) => c.startsWith(name + "="));
      return m ? decodeURIComponent(m.split("=").slice(1).join("=")) : "";
    }

    async function api(path, { method = "GET", body = null } = {}) {
      const opts = { method, headers: {}, credentials: "same-origin" };
      if (!["GET", "HEAD", "OPTIONS"].includes(method)) opts.headers["X-CSRF-Token"] = getCookie("csrf_token");
      if (body !== null) { opts.headers["Content-Type"] = "application/json"; opts.body = JSON.stringify(body); }
      const res = await fetch(path, opts);
      let data = null;
      try { data = await res.json(); } catch (_) { data = null; }
      return { ok: res.ok, status: res.status, data };
    }

    function showTab(which) {
      $("tab-login").classList.toggle("active", which === "login");
      $("tab-register").classList.toggle("active", which === "register");
      $("login-form").hidden = which !== "login";
      $("register-form").hidden = which !== "register";
    }

    function showView(view) {
      $("auth-view").hidden = view !== "auth";
      $("app-view").hidden = view !== "app";
      $("who").hidden = view !== "app";
    }

    function flash(id, msg, kind = "error") { const el = $(id); el.textContent = msg || ""; el.className = "flash " + kind; }

    // Disable the submit button while the request is in flight -> no double-submit (e.g. double posts).
    function onSubmit(formId, handler) {
      $(formId).addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector("button[type=submit]");
        if (btn) btn.disabled = true;
        try { await handler(e.target); } finally { if (btn) btn.disabled = false; }
      });
    }

    // ---- Auth ----
    onSubmit("login-form", async (f) => {
      const r = await api("/login", { method: "POST", body: { username: f.username.value, password: f.password.value } });
      if (r.ok) { enterApp(r.data.username); } else { flash("login-flash", (r.data && r.data.error) || "Login failed"); }
    });

    onSubmit("register-form", async (f) => {
      const r = await api("/register", { method: "POST", body: { username: f.username.value, password: f.password.value } });
      if (r.ok) { flash("register-flash", "Account created — you can log in now.", "ok"); showTab("login"); }
      else { flash("register-flash", (r.data && r.data.error) || "Registration failed"); }
    });

    $("logout-btn").addEventListener("click", async () => { await api("/logout", { method: "POST" }); showView("auth"); });

    // ---- Profile ----
    onSubmit("profile-form", async (f) => {
      const body = {
        age: Number.parseInt(f.age.value, 10),
        gender: f.gender.value,
        height: Number(f.height.value),
        weight: Number(f.weight.value),
        goal: f.goal.value,
        training_frequency: Number.parseInt(f.training_frequency.value, 10),
      };
      const r = await api("/profile", { method: "POST", body });
      if (r.ok) { flash("profile-flash", "Saved.", "ok"); loadDashboard(); }
      else { flash("profile-flash", (r.data && r.data.error) || "Could not save profile"); }
    });

    // ---- Daily check-in ----
    onSubmit("checkin-form", async (f) => {
      const body = {
        sleep_hours: Number(f.sleep_hours.value),
        resting_hr: Number.parseInt(f.resting_hr.value, 10),
        fatigue: Number.parseInt(f.fatigue.value, 10),
        soreness: Number.parseInt(f.soreness.value, 10),
        training_load: Number.parseInt(f.training_load.value, 10),
      };
      const r = await api("/checkin", { method: "POST", body });
      if (r.ok) { flash("checkin-flash", "Check-in saved.", "ok"); f.reset(); loadDashboard(); loadHistory(); }
      else { flash("checkin-flash", (r.data && r.data.error) || "Could not save check-in"); }
    });

    async function loadProfile() {
      const r = await api("/profile");
      if (r.ok && r.data && r.data.profile) {
        const p = r.data.profile, f = $("profile-form");
        for (const k of ["age", "gender", "height", "weight", "goal", "training_frequency"]) {
          if (p[k] !== undefined && f[k]) f[k].value = p[k];
        }
      }
    }

    // ---- Dashboard ----
    // Map the AI's free-form state word to a readiness bucket + track level (presentation only; the AI
    // owns the actual words, so an unknown state degrades to a neutral signal rather than miscolouring).
    function readinessClass(state) {
      const s = String(state || "").toLowerCase();
      if (/\b(ready|go|high|good|optimal|peak|fresh)\b/.test(s)) return ["ready", 100];
      if (/\b(moderate|caution|medium|fair|ok|maintain)\b/.test(s)) return ["moderate", 66];
      if (/\b(rest|low|recover|recovery|fatigued?|poor|over\w*)\b/.test(s)) return ["rest", 33];
      return ["", 50];
    }

    async function loadDashboard() {
      const el = $("dashboard"); el.innerHTML = '<p class="muted">Loading…</p>';
      const r = await api("/dashboard");
      if (!r.ok) { el.innerHTML = '<p class="flash error">Could not load the dashboard.</p>'; return; }
      const d = r.data;
      if (d.needs_profile) { el.innerHTML = '<p class="muted">Fill in your profile above to see your readiness.</p>'; return; }
      let html = "";
      if (d.ai_status === "unavailable") {
        html += '<p class="flash warn">Readiness is temporarily unavailable (AI service down).</p>';
      } else if (d.readiness) {
        const [cls, pct] = readinessClass(d.readiness.state);
        html += '<div class="readiness ' + cls + '">'
          + '<div class="verdict"><span class="signal" aria-hidden="true"></span>' + escapeHtml(d.readiness.state || "—") + '</div>'
          + '<div class="track"><span data-w="' + pct + '"></span></div>';
        const recs = Array.isArray(d.readiness.recommendations) ? d.readiness.recommendations : [];
        if (recs.length) html += "<ul>" + recs.map((x) => "<li>" + escapeHtml(x) + "</li>").join("") + "</ul>";
        html += '</div>';
      }
      if (d.calories != null) html += '<p style="margin-top:14px"><span class="pill">Daily target: ' + escapeHtml(d.calories) + ' kcal</span></p>';
      el.innerHTML = html || '<p class="muted">No readiness yet.</p>';
      // animate the recovery track from 0 -> level (one orchestrated moment; reduced-motion shows it filled)
      requestAnimationFrame(() => {
        const bar = el.querySelector(".track > span");
        if (bar) { bar.style.setProperty("--w", bar.dataset.w + "%"); bar.style.width = bar.dataset.w + "%"; }
      });
    }

    // ---- History ----
    async function loadHistory() {
      const el = $("history"); el.innerHTML = '<p class="muted">Loading…</p>';
      const r = await api("/history");
      if (!r.ok) { el.innerHTML = '<p class="flash error">Could not load history.</p>'; return; }
      const items = (r.data && r.data.history) || [];
      if (!items.length) { el.innerHTML = '<p class="muted">No past analyses yet.</p>'; return; }
      el.innerHTML = "<ul>" + items.map((it) =>
        "<li><strong>" + escapeHtml(it.assessment || "—") + "</strong> "
        + (it.calories != null ? "· " + escapeHtml(it.calories) + " kcal " : "")
        + '<span class="muted">' + escapeHtml(it.timestamp || "") + "</span></li>"
      ).join("") + "</ul>";
    }

    // ---- Forum ----
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    let currentPostId = null;
    let currentPost = null;
    let currentUser = null;

    async function loadForum() {
      const el = $("forum-list"); el.innerHTML = '<p class="muted">Loading…</p>';
      const r = await api("/forum/posts");
      if (!r.ok) { el.innerHTML = '<p class="flash error">Could not load the forum.</p>'; return; }
      const posts = (r.data && r.data.posts) || [];
      if (!posts.length) { el.innerHTML = '<p class="muted">No posts yet — start one above.</p>'; return; }
      el.innerHTML = posts.map((p) =>
        '<div class="post" data-id="' + escapeHtml(p.id) + '" style="padding:8px 0;border-top:1px solid var(--line);cursor:pointer">'
        + '<strong>' + escapeHtml(p.title) + '</strong> <span class="pill">score ' + escapeHtml(p.score) + '</span><br>'
        + '<span class="muted">by ' + escapeHtml(p.author) + ' · ' + escapeHtml(p.comments) + ' comment' + (p.comments === 1 ? '' : 's') + '</span></div>'
      ).join("");
      el.querySelectorAll(".post").forEach((d) => d.addEventListener("click", () => openPost(d.dataset.id)));
    }

    async function openPost(id) {
      currentPostId = id;
      const r = await api("/forum/posts/" + id);
      const box = $("forum-detail");
      if (!r.ok || !r.data || !r.data.post) { box.hidden = true; return; }
      const p = r.data.post;
      currentPost = p;
      box.hidden = false;
      box.innerHTML =
        '<div class="card" style="background:var(--field);margin-top:12px">'
        + '<button class="ghost" style="float:right;padding:4px 9px" onclick="closePost()">Close</button>'
        + '<h3 style="margin:0 0 4px">' + escapeHtml(p.title) + '</h3>'
        + '<p class="muted" style="margin:0 0 8px">by ' + escapeHtml(p.author) + '</p>'
        + '<p>' + escapeHtml(p.body) + '</p>'
        + '<p><button class="ghost" onclick="vote(1)">▲ up</button> <span class="pill">score ' + escapeHtml(p.score)
        + '</span> <button class="ghost" onclick="vote(-1)">▼ down</button></p>'
        + (p.author === currentUser
            ? '<p><button class="ghost" onclick="editPost()">Edit</button> <button class="ghost" onclick="deletePost()">Delete</button></p>'
            : '')
        + '<h4 style="margin:12px 0 6px">Comments</h4>'
        + (p.comments.length
            ? '<ul>' + p.comments.map((c) => '<li><strong>' + escapeHtml(c.author) + ':</strong> ' + escapeHtml(c.body) + '</li>').join("") + '</ul>'
            : '<p class="muted">No comments yet.</p>')
        + '<form id="comment-form" style="margin-top:8px"><input name="body" placeholder="Add a comment" aria-label="Add a comment" maxlength="2000" required>'
        + '<div style="margin-top:6px"><button type="submit">Comment</button></div></form></div>';
      onSubmit("comment-form", async (f) => {
        const cr = await api("/forum/posts/" + id + "/comments", { method: "POST", body: { body: f.body.value } });
        if (cr.ok) openPost(id);
      });
    }

    function closePost() { $("forum-detail").hidden = true; currentPostId = null; currentPost = null; }

    async function deletePost() {
      if (!currentPost) return;
      const r = await api("/forum/posts/" + currentPost.id, { method: "DELETE" });
      if (r.ok) { closePost(); loadForum(); }
    }

    function editPost() {
      if (!currentPost) return;
      $("forum-detail").innerHTML =
        '<div class="card" style="background:var(--field);margin-top:12px">'
        + '<h3 style="margin:0 0 8px">Edit post</h3>'
        + '<form id="edit-form"><input name="title" maxlength="140" aria-label="Title" required>'
        + '<textarea name="body" rows="3" maxlength="5000" aria-label="Body" style="margin-top:8px;resize:vertical" required></textarea>'
        + '<div style="margin-top:8px"><button type="submit">Save</button> '
        + '<button type="button" class="ghost" onclick="cancelEdit()">Cancel</button></div></form></div>';
      $("edit-form").elements.title.value = currentPost.title;   // set via .value -> no HTML-injection
      $("edit-form").elements.body.value = currentPost.body;
      onSubmit("edit-form", async (f) => {
        const r = await api("/forum/posts/" + currentPost.id,
          { method: "PATCH", body: { title: f.elements.title.value, body: f.elements.body.value } });
        if (r.ok) openPost(currentPost.id);
      });
    }

    function cancelEdit() { if (currentPost) openPost(currentPost.id); }

    async function vote(value) {
      if (!currentPostId) return;
      const r = await api("/forum/posts/" + currentPostId + "/vote", { method: "POST", body: { value } });
      if (r.ok) { openPost(currentPostId); loadForum(); }
    }

    onSubmit("forum-form", async (f) => {
      const r = await api("/forum/posts", { method: "POST", body: { title: f.title.value, body: f.body.value, anonymous: f.anonymous.checked } });
      if (r.ok) { f.reset(); flash("forum-flash", "Posted.", "ok"); loadForum(); }
      else { flash("forum-flash", (r.data && r.data.error) || "Could not post"); }
    });
    $("forum-refresh").addEventListener("click", loadForum);
    $("dashboard-refresh").addEventListener("click", loadDashboard);
    $("history-refresh").addEventListener("click", loadHistory);

    function enterApp(username) {
      currentUser = username;
      $("who-name").textContent = "Hi, " + username;
      showView("app");
      loadProfile(); loadDashboard(); loadHistory(); loadForum();
    }

    // Populate the register-form requirement hints from the server's validator bounds (one source of
    // truth: /auth/config). If unreachable (e.g. the file opened statically), leave them blank — never
    // show a stale/hardcoded value or a raw placeholder.
    async function applyCredentialHints() {
      const r = await api("/auth/config");
      if (!r.ok || !r.data) return;
      const c = r.data;
      const set = (infoId, tipId, lo, hi, noun) => {
        $(tipId).textContent = lo + "–" + hi + " characters";
        $(infoId).setAttribute("aria-label", noun + " must be " + lo + " to " + hi + " characters");
      };
      set("reg-username-info", "reg-username-tip", c.username_min, c.username_max, "Username");
      set("reg-password-info", "reg-password-tip", c.password_min, c.password_max, "Password");
      $("reg-pw-minhint").textContent = " (min " + c.password_min + " chars)";
      $("reg-username").minLength = c.username_min; $("reg-username").maxLength = c.username_max;
      $("reg-password").minLength = c.password_min; $("reg-password").maxLength = c.password_max;
    }

    // ---- Boot: am I already logged in? (GET /me) ----
    (async function init() {
      applyCredentialHints();
      const r = await api("/me");
      if (r.ok && r.data && r.data.username) { enterApp(r.data.username); } else { showView("auth"); }
    })();
  </script>
</body>
</html>
