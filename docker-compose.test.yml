# Test-stack override — applied ON TOP of docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from tests
#
# Brings the same 3 containers up in TESTING mode against a THROWAWAY database (`worksmarter_test`),
# so a test run never touches dev/prod data, and adds a 4th, short-lived `tests` container: the
# cross-container test RUNNER (OWNER: Elad). Only `web` stays exposed — the runner publishes nothing.
#
# The runner proves what the host's in-process pytest cannot: the REAL wire path (HTTP over the
# compose network, gunicorn, a real Mongo) between web -> ai -> db.
services:
  web:
    environment:
      TESTING: "1"
      MONGO_URI: mongodb://db:27017/worksmarter_test

  tests:
    build:
      context: .
      dockerfile: tests/Dockerfile
    # No `ports:` — the runner is internal, like ai/db. It exits 0/1 and the stack tears down with it.
    environment:
      TESTING: "1"
      E2E_BASE_URL: http://web:5000          # un-skips tests/System_Tests (they skip without it)
      TEST_MONGO_URI: mongodb://db:27017/worksmarter_test   # un-skips the real-Mongo data-layer suite
      AI_BASE_URL: http://ai:5000            # un-skips the live job-queue suite (real process pool)
    depends_on:
      web: { condition: service_healthy }    # don't start testing until web actually serves
      db: { condition: service_healthy }     # ...and Mongo accepts connections
      ai: { condition: service_healthy }     # ...and the ai container's queue is up
    restart: "no"                            # a test run is one-shot: never restart it on exit
    # The per-PR deploy gate runs the DETERMINISTIC wire-path proof: System (web->ai->db over HTTP) + the
    # real-Mongo data layer. The load-sensitive stress burst (test_load.py) is NOT gated here — on a shared
    # 2-core runner (now also running the heavy ML `ai` container) the server can drop a connection under
    # the self-generated flood, flaking the gate on unrelated PRs. Stress stays in the on-demand `stress`
    # CI job (workflow_dispatch, pytest tests/Stress_Tests + locust), so coverage is kept, gate stays green.
    command: >
      python -m pytest tests/System_Tests tests/Integration_Tests/test_db_mongo.py -q
